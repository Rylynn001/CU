services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: comfyui
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  comfyui:
    build: ./ComfyUI
    volumes:
      - ./ComfyUI:/app                          # 挂载源码，git pull 后 restart 即生效
      - ./ComfyUI/models:/app/models            # 覆盖模型目录（大文件单独管理）
      - ./ComfyUI/custom_nodes:/app/custom_nodes
      - ./ComfyUI/output:/app/output
      - ./ComfyUI/input:/app/input
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  comfy-web:
    build: ./comfy-web
    ports:
      - "80:80"
    depends_on:
      - comfyui
    restart: unless-stopped

volumes:
  mysql_data:
